name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  postgres-readonly:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servers/postgres-readonly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/postgres-readonly/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  github-gists:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servers/github-gists
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/github-gists/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  internal-tools-bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servers/internal-tools-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/internal-tools-bridge/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  filesystem-sandbox:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servers/filesystem-sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/filesystem-sandbox/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  memory-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MEMORY directory exists and has required files
        run: |
          test -f MEMORY/full_history_ai.md
          test -f MEMORY/full_history_human.md
          test -f MEMORY/core_decisions_ai.md
          test -f MEMORY/core_decisions_human.md
      - name: Verify D-001 baseline decision exists
        run: |
          grep -q "id: D-001" MEMORY/core_decisions_ai.md

  spec-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify every server pins the SDK to docs/spec-version.md
        run: node tools/check-spec-version.mjs
      - name: Run the spec-version script's own unit tests
        run: node --test tools/check-spec-version.test.mjs

  readme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify README server refs + test-count claims match reality
        run: node tools/check-readme.mjs
      - name: Run the README check script's own unit tests
        run: node --test tools/check-readme.test.mjs

  architecture-doc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify docs/architecture.md server refs and stale-phrase absence
        run: node tools/check-architecture-doc.mjs
      - name: Run the architecture-doc check script's own unit tests
        run: node --test tools/check-architecture-doc.test.mjs

  capture-demo:
    # Hermetic smoke for tools/capture_demo.sh — the deterministic driver
    # for the 60-second README demo (#16). Each of three surfaces exercises
    # a load-bearing primitive (D-004 SQL guard, D-005/D-006 sandbox path
    # resolution, D-007 token redaction). No DB, no network, no real token.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install postgres-readonly node_modules (for tsx)
        working-directory: servers/postgres-readonly
        run: npm ci
      - name: Install github-gists node_modules (for tsx)
        working-directory: servers/github-gists
        run: npm ci
      - name: Install filesystem-sandbox-py (importable for the demo)
        working-directory: servers/filesystem-sandbox-py
        run: pip install -e .
      - name: Run capture-demo smoke + assert contract
        run: node tools/check-capture-demo.mjs
      - name: Run capture-demo asserter's own unit tests
        run: node --test tools/check-capture-demo.test.mjs
