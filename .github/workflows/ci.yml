name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  postgres-readonly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: servers/postgres-readonly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/postgres-readonly/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  github-gists:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: servers/github-gists
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/github-gists/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  internal-tools-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: servers/internal-tools-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/internal-tools-bridge/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  filesystem-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: servers/filesystem-sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: servers/filesystem-sandbox/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  memory-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Verify MEMORY directory exists and has required files
        run: |
          test -f MEMORY/full_history_ai.md
          test -f MEMORY/full_history_human.md
          test -f MEMORY/core_decisions_ai.md
          test -f MEMORY/core_decisions_human.md
      - name: Verify D-001 baseline decision exists
        run: |
          grep -q "id: D-001" MEMORY/core_decisions_ai.md

  spec-version:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify every server pins the SDK to docs/spec-version.md
        run: node tools/check-spec-version.mjs
      - name: Run the spec-version script's own unit tests
        run: node --test tools/check-spec-version.test.mjs

  readme-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify README server refs + test-count claims match reality
        run: node tools/check-readme.mjs
      - name: Run the README check script's own unit tests
        run: node --test tools/check-readme.test.mjs
      - name: Verify every server README ships a claude_desktop_config snippet
        run: node tools/check-claude-desktop-config.mjs
      - name: Run the claude_desktop_config check script's own unit tests
        run: node --test tools/check-claude-desktop-config.test.mjs

  architecture-doc-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify docs/architecture.md server refs and stale-phrase absence
        run: node tools/check-architecture-doc.mjs
      - name: Run the architecture-doc check script's own unit tests
        run: node --test tools/check-architecture-doc.test.mjs

  capture-demo-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run the 60-second demo capture orchestrator's own unit tests
        run: node --test tools/capture-demo.test.mjs

  workflow-yaml-check:
    # Inverse safety net for the 21-day silent CI outage closed in
    # portfolio-ops#27. Parses every .github/workflows/*.yml and asserts
    # a non-empty `jobs:` mapping. See tools/check-workflow-yaml.mjs.
    #
    # Extended in #48 to also enforce timeout-minutes on every job
    # (silent-rot propagation from llm-eval-harness#63 / portfolio-ops#36).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Verify every workflow YAML parses + has non-empty jobs
        run: node tools/check-workflow-yaml.mjs
      - name: Run the workflow-yaml check script's own unit tests
        run: node --test tools/check-workflow-yaml.test.mjs
      - name: Verify every workflow job has a sensible timeout-minutes
        run: node tools/check-workflow-timeout.mjs
      - name: Run the workflow-timeout check script's own unit tests
        run: node --test tools/check-workflow-timeout.test.mjs
